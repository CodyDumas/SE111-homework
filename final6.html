<!DOCTYPE html>
<html>
<head>
    <title>Paycheck Calculator</title>
</head>
<body>

<script>
    var hourlyPay = Number(prompt("Enter hourly pay:"));
    var hoursPerWeek = Number(prompt("Enter hours worked per week:"));
    var taxRate = Number(prompt("Enter tax rate as a decimal:"));

    var grossPay = hourlyPay * hoursPerWeek * 2;
    var taxAmount = grossPay * taxRate;
    var netPay = grossPay - taxAmount;

    alert("Gross Pay: $" + grossPay.toFixed(2) + "\nUncle Sam's Share: $" + taxAmount.toFixed(2) + "\nNet Pay: $" + netPay.toFixed(2));

    console.log("Gross Pay: $" + grossPay.toFixed(2));
    console.log("Uncle Sam's Share: $" + taxAmount.toFixed(2));
    console.log("Net Pay: $" + netPay.toFixed(2));
</script>

</body>
</html>
